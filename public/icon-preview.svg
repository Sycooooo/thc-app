<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-small" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background navy -->
  <rect width="512" height="512" fill="#0a0a14"/>

  <!-- Subtle ambient glow behind text -->
  <g filter="url(#ambient)">
    <ellipse cx="256" cy="256" rx="220" ry="100" fill="#c084fc" opacity="0.12"/>
  </g>

  <!-- Pixel letters THC with neon glow -->
  <g filter="url(#neon)" fill="#c084fc">

    <!-- ===== T ===== origin (52, 172), stride 24, rect 22x22 -->
    <!-- Row 0 - top bar -->
    <rect x="52" y="172" width="22" height="22"/>
    <rect x="76" y="172" width="22" height="22"/>
    <rect x="100" y="172" width="22" height="22"/>
    <rect x="124" y="172" width="22" height="22"/>
    <rect x="148" y="172" width="22" height="22"/>
    <!-- Rows 1-6 - stem -->
    <rect x="100" y="196" width="22" height="22"/>
    <rect x="100" y="220" width="22" height="22"/>
    <rect x="100" y="244" width="22" height="22"/>
    <rect x="100" y="268" width="22" height="22"/>
    <rect x="100" y="292" width="22" height="22"/>
    <rect x="100" y="316" width="22" height="22"/>

    <!-- ===== H ===== origin (196, 172) -->
    <!-- Left stem -->
    <rect x="196" y="172" width="22" height="22"/>
    <rect x="196" y="196" width="22" height="22"/>
    <rect x="196" y="220" width="22" height="22"/>
    <rect x="196" y="244" width="22" height="22"/>
    <rect x="196" y="268" width="22" height="22"/>
    <rect x="196" y="292" width="22" height="22"/>
    <rect x="196" y="316" width="22" height="22"/>
    <!-- Right stem -->
    <rect x="292" y="172" width="22" height="22"/>
    <rect x="292" y="196" width="22" height="22"/>
    <rect x="292" y="220" width="22" height="22"/>
    <rect x="292" y="244" width="22" height="22"/>
    <rect x="292" y="268" width="22" height="22"/>
    <rect x="292" y="292" width="22" height="22"/>
    <rect x="292" y="316" width="22" height="22"/>
    <!-- Crossbar row 3 -->
    <rect x="220" y="244" width="22" height="22"/>
    <rect x="244" y="244" width="22" height="22"/>
    <rect x="268" y="244" width="22" height="22"/>

    <!-- ===== C ===== origin (340, 172) -->
    <!-- Row 0 - top -->
    <rect x="364" y="172" width="22" height="22"/>
    <rect x="388" y="172" width="22" height="22"/>
    <rect x="412" y="172" width="22" height="22"/>
    <!-- Row 1 -->
    <rect x="340" y="196" width="22" height="22"/>
    <rect x="436" y="196" width="22" height="22"/>
    <!-- Rows 2-4 - left stem -->
    <rect x="340" y="220" width="22" height="22"/>
    <rect x="340" y="244" width="22" height="22"/>
    <rect x="340" y="268" width="22" height="22"/>
    <!-- Row 5 -->
    <rect x="340" y="292" width="22" height="22"/>
    <rect x="436" y="292" width="22" height="22"/>
    <!-- Row 6 - bottom -->
    <rect x="364" y="316" width="22" height="22"/>
    <rect x="388" y="316" width="22" height="22"/>
    <rect x="412" y="316" width="22" height="22"/>
  </g>

  <!-- Sparkles in amber -->
  <g fill="#f4b860" filter="url(#neon-small)">
    <!-- Sparkle top-left (cross pattern) -->
    <rect x="36" y="138" width="8" height="8"/>
    <rect x="28" y="146" width="8" height="8"/>
    <rect x="36" y="146" width="8" height="8"/>
    <rect x="44" y="146" width="8" height="8"/>
    <rect x="36" y="154" width="8" height="8"/>

    <!-- Sparkle top-right -->
    <rect x="472" y="151" width="6" height="6"/>
    <rect x="466" y="157" width="6" height="6"/>
    <rect x="472" y="157" width="6" height="6"/>
    <rect x="478" y="157" width="6" height="6"/>
    <rect x="472" y="163" width="6" height="6"/>

    <!-- Sparkle bottom-center -->
    <rect x="252" y="363" width="8" height="8"/>
    <rect x="244" y="371" width="8" height="8"/>
    <rect x="252" y="371" width="8" height="8"/>
    <rect x="260" y="371" width="8" height="8"/>
    <rect x="252" y="379" width="8" height="8"/>

    <!-- Small dot bottom-right -->
    <rect x="457" y="342" width="6" height="6"/>

    <!-- Small dot bottom-left -->
    <rect x="68" y="358" width="5" height="5"/>
  </g>

  <!-- Extra tiny accent sparkles in pink -->
  <g fill="#f472b6" opacity="0.7" filter="url(#neon-small)">
    <rect x="480" y="320" width="4" height="4"/>
    <rect x="22" y="200" width="4" height="4"/>
    <rect x="170" y="370" width="4" height="4"/>
  </g>
</svg>
